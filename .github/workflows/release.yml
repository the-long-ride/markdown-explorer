name: Release and Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-vscode:
    name: Build VS Code Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' && github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build VSIX Package
        run: npm run package

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: vscode/*.vsix

  build-desktop:
    name: Build Desktop Application (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' && github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Electron App
        run: npm run build:desktop
        env:
          # macOS: skip code signing for unsigned open-source builds.
          # Set CSC_IDENTITY_AUTO_DISCOVERY=false so electron-builder doesn't
          # fail when no Apple Developer certificate is present in the runner.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Desktop Artifact (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-app-windows
          path: desktop/dist/*.exe

      - name: Upload Desktop Artifact (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-app-linux
          path: |
            desktop/dist/*.deb
            desktop/dist/*.AppImage

      - name: Upload Desktop Artifact (macOS)
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-app-macos
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip

  publish-release:
    name: Create GitHub Release
    needs: [build-vscode, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Download VSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: vscode-extension
          path: ./release-artifacts

      - name: Download Windows Desktop Artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-app-windows
          path: ./release-artifacts

      - name: Download Linux Desktop Artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-app-linux
          path: ./release-artifacts

      - name: Download macOS Desktop Artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-app-macos
          path: ./release-artifacts

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release-artifacts/*
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' && github.event.inputs.tag || github.event_name != 'workflow_dispatch' && github.ref_name || '' }}
