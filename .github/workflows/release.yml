name: Release and Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-vscode:
    name: Build VS Code Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build VSIX Package
        run: npm run package

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: vscode/*.vsix

  build-desktop:
    name: Build Desktop Application (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Electron App
        run: npm run build:desktop

      - name: Upload Desktop Artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-app-windows
          path: desktop/dist/*.exe

      - name: Upload Desktop Artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-app-linux
          path: |
            desktop/dist/*.deb
            desktop/dist/*.AppImage

  publish-release:
    name: Create GitHub Release
    needs: [build-vscode, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Download VSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: vscode-extension
          path: ./release-artifacts

      - name: Download Windows Desktop Artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-app-windows
          path: ./release-artifacts

      - name: Download Linux Desktop Artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-app-linux
          path: ./release-artifacts

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release-artifacts/*
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
